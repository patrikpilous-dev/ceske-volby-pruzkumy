<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Volební průzkumy — České volby</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,300;0,400;0,700;1,300&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --navy:   #3D4263;
  --navy2:  #2A2E4A;
  --red:    #C0272D;
  --bg:     #F7F8FB;
  --white:  #FFFFFF;
  --border: #D8DAEA;
  --muted:  #8890B0;
  --text:   #1E2240;
  --text2:  #4A5070;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Source Sans 3', sans-serif; background: transparent; color: var(--text); font-size: 15px; line-height: 1.5; }

/* ── Header — pouze pro standalone stránku (v embed.html vynecháno) ── */
.hdr { background: var(--white); border-bottom: 2px solid var(--navy); padding: 16px 24px; }
.hdr h1 { font-family: 'Merriweather', serif; font-size: 22px; font-weight: 400; color: var(--navy); letter-spacing: -.01em; }
.hdr h1 .r { color: var(--red); }

/* ── Layout ── */
.main { max-width: 100%; margin: 0; padding: 12px 0 32px; display: flex; flex-direction: column; gap: 28px; }

/* ── Karta ── */
.card { background: var(--white); border: 1px solid var(--border); }
.card-head { padding: 20px 24px 0; }

/* ── Červený box — 3 průzkumy ── */
.lbox { display: none; background: var(--red); color: #fff; padding: 11px 20px 13px; margin-bottom: 18px; }
.lbox.on { display: block; }
.lbox-label { font-size: 10px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; opacity: .82; margin-bottom: 9px; }
.lbox-items { display: flex; flex-wrap: wrap; gap: 6px; }
.lbox-item { display: inline-flex; align-items: center; gap: 8px; background: rgba(255,255,255,.15); padding: 5px 11px; }
.lbox-item a { color: #fff; text-decoration: none; font-family: 'Merriweather', serif; font-size: 13px; font-weight: 400; }
.lbox-item a:hover { text-decoration: underline; }
.lbox-item .dt { font-size: 11px; opacity: .75; }

/* ── Nadpis ── */
.ctitle { font-family: 'Merriweather', serif; font-size: 16px; font-weight: 400; color: var(--navy2); margin-bottom: 16px; }

/* ── Toolbar ── */
.tb { display: flex; flex-wrap: wrap; gap: 12px 20px; align-items: flex-end; padding: 14px 24px; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); background: #FAFBFD; }
.cg { display: flex; flex-direction: column; gap: 4px; }
.cl { font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); }
.bg { display: flex; }
.bg .b { padding: 6px 13px; font-family: 'Source Sans 3', sans-serif; font-size: 12.5px; font-weight: 400; border: 1px solid var(--border); background: var(--white); color: var(--text2); cursor: pointer; border-radius: 0; margin-right: -1px; position: relative; white-space: nowrap; transition: background .1s, color .1s; }
.bg .b:hover { background: var(--bg); color: var(--navy); }
.bg .b.on { background: var(--navy); border-color: var(--navy); color: #fff; font-weight: 500; z-index: 1; }

/* ── Filtry agentur (graf 2) ── */
.af { display: flex; flex-wrap: wrap; gap: 5px; }
.ac { display: inline-flex; align-items: center; gap: 5px; padding: 5px 10px; font-size: 12px; font-weight: 500; border: 1px solid var(--border); background: var(--white); color: var(--text2); cursor: pointer; user-select: none; transition: all .1s; }
.ac .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.ac.on { background: var(--navy); border-color: var(--navy); color: #fff; }
.ac.on .dot { background: #fff !important; }

/* ── Graf ── */
.cw { padding: 20px 24px 10px; }

/* ── Průměrový řádek ── */
.avg-row { display: flex; flex-wrap: wrap; gap: 6px 8px; padding: 16px 24px 18px; border-top: 2px solid var(--border); }
.avg-row-label { font-family: 'Merriweather', serif; font-size: 15px; font-weight: 400; color: var(--navy2); width: 100%; margin-bottom: 10px; }
.avg-chip { display: inline-flex; align-items: center; gap: 5px; padding: 3px 9px; border: 1px solid var(--border); font-size: 12px; color: var(--text2); }
.avg-chip .dot { width: 8px; height: 8px; border-radius: 0; flex-shrink: 0; }
.avg-chip strong { color: var(--text); font-weight: 600; margin-left: 2px; }

/* ── Legenda ── */
.leg { display: flex; flex-wrap: wrap; gap: 4px 12px; padding: 10px 24px 14px; border-top: 1px solid var(--border); }
.li { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text2); cursor: pointer; padding: 2px 5px; user-select: none; transition: opacity .1s; }
.li.off { opacity: .28; }
.li.nodim { cursor: default; }
.ld { width: 10px; height: 10px; border-radius: 0; flex-shrink: 0; }
.leg-div { width: 100%; height: 1px; background: var(--border); margin: 4px 0; }

/* ── Meta ── */
.meta { display: flex; flex-wrap: wrap; gap: 6px 18px; padding: 8px 24px 14px; font-size: 11px; color: var(--muted); border-top: 1px solid var(--border); }
.meta b { color: var(--text2); font-weight: 600; }
.meta a { color: var(--navy); text-decoration: none; font-weight: 600; }
.meta a:hover { text-decoration: underline; }

/* ── CVVM / preference badge ── */
.pref-badge { font-size: 9px; background: #7B5EA7; color: #fff; padding: 1px 4px; margin-left: 2px; vertical-align: middle; }

@media(max-width:640px) {
  .main { padding: 14px 12px 36px; }
  .card-head, .tb, .cw, .avg-row, .leg, .meta { padding-left: 14px; padding-right: 14px; }
}
</style>
</head>
<body>

<main class="main">

  <!-- ══ GRAF 1 — Aktuální preference ══ -->
  <div class="card">
    <div class="card-head">
      <div class="lbox" id="lbox">
        <div class="lbox-label">Aktuální průzkumy preferencí</div>
        <div class="lbox-items" id="lboxItems"></div>
      </div>
      <div class="ctitle">Aktuální volební preference</div>
    </div>
    <div class="tb">
      <div class="cg">
        <span class="cl">Zobrazit jako</span>
        <div class="bg">
          <button class="b on" id="g1vP" onclick="g1setView('parties')">Strany</button>
          <button class="b"    id="g1vC" onclick="g1setView('coalitions')">Koalice</button>
        </div>
      </div>
    </div>
    <div class="cw"><canvas id="c1" height="360"></canvas></div>
    <div class="avg-row" id="avgRow"></div>
    <div class="leg" id="leg1"></div>
    <div class="meta" id="meta1"></div>
  </div>

  <!-- ══ GRAF 2 — Vývoj v čase ══ -->
  <div class="card">
    <div class="card-head">
      <div class="ctitle" style="margin-top:20px">Vývoj preferencí v čase</div>
    </div>
    <div class="tb">
      <div class="cg">
        <span class="cl">Zobrazit jako</span>
        <div class="bg">
          <button class="b on" id="g2vP" onclick="g2setView('parties')">Strany</button>
          <button class="b"    id="g2vC" onclick="g2setView('coalitions')">Koalice</button>
        </div>
      </div>
      <div class="cg" style="flex-basis:100%">
        <span class="cl">Agentury</span>
        <div class="af" id="af2"></div>
      </div>
    </div>
    <div class="cw"><canvas id="c2" height="420"></canvas></div>
    <div class="leg" id="leg2"></div>
    <div class="meta" id="meta2"></div>
  </div>

</main>

<script>
// ══ Konfigurace ═══════════════════════════════════════════
// Koalice jsou jasně označeny — filtrování dle COAL_IDS, ne dle pole "view"
const COAL_IDS = new Set(["SPOLU","SPD4K","StačiloKoalice","PirátéZelení"]);

const PC = {
  ANO:             { d:"ANO",              c:"#7B2D8B" },
  ODS:             { d:"ODS",              c:"#034FA0" },
  STAN:            { d:"STAN",             c:"#1A9CD8" },
  "Piráti":        { d:"Piráti",           c:"#1A1A2E" },
  SPD:             { d:"SPD",              c:"#E07000" },
  "Motoristé":     { d:"Motoristé",        c:"#C8102E" },
  TOP09:           { d:"TOP 09",           c:"#CF0080" },
  KDUČSL:          { d:"KDU-ČSL",          c:"#D4A000" },
  KSČM:            { d:"KSČM",             c:"#BE0000" },
  "Stačilo":       { d:"Stačilo!",         c:"#8B0000" },
  SOCDEM:          { d:"SOCDEM",           c:"#E05A00" },
  "Přísaha":       { d:"Přísaha",          c:"#555555" },
  "Zelení":        { d:"Zelení",           c:"#2E8B2E" },
  PRO:             { d:"PRO",              c:"#003399" },
  SPOLU:           { d:"SPOLU",            c:"#034FA0" },
  SPD4K:           { d:"SPD 4K",           c:"#E07000" },
  StačiloKoalice:  { d:"Stačilo! (koa.)",  c:"#BE0000" },
  "PirátéZelení":  { d:"Piráti+Zelení",    c:"#1A1A2E" },
  "NašeČesko":     { d:"Naše Česko",       c:"#0050A0" },
};

const AC = {
  STEM:"#3D4263", Median:"#C0272D", Kantar:"#003087",
  Ipsos:"#1D7A3A", CVVM:"#7B5EA7", NMS:"#E07000",
  "STEM/MARK":"#555", SANEP:"#999",
};

const AGENCY_URLS = {
  STEM:        "https://www.ceske-volby.cz/tag/stem/",
  Median:      "https://www.ceske-volby.cz/tag/median/",
  Kantar:      "https://www.ceske-volby.cz/tag/kantar-cz/",
  Ipsos:       "https://www.ceske-volby.cz/tag/ipsos/",
  CVVM:        "https://www.ceske-volby.cz/tag/cvvm/",
  NMS:         "https://www.ceske-volby.cz/tag/nms/",
  SANEP:       "https://www.ceske-volby.cz/tag/sanep/",
  "STEM/MARK": "https://www.ceske-volby.cz/tag/stem/",
};

// CVVM měří stranické preference, ostatní volební model
const AGENCY_TYPE = { CVVM: "preference" };

// Čárové vzory dle agentury pro graf 2
const AGENCY_DASH = {
  STEM:        [],
  Median:      [6,3],
  Kantar:      [2,3],
  Ipsos:       [8,3,2,3],
  CVVM:        [10,4],
  NMS:         [4,2],
  SANEP:       [6,2,2,2],
  "STEM/MARK": [],
};

// ══ Data ══════════════════════════════════════════════════
let POLLS = [];

async function loadPolls() {
  try {
    const r = await fetch("https://patrikpilous-dev.github.io/ceske-volby-pruzkumy/data/polls.json");
    if (!r.ok) throw new Error();
    POLLS = await r.json();
  } catch {
    POLLS = EMBEDDED;
  }
  init();
}

// ══ Stav ══════════════════════════════════════════════════
const S1 = { view:"parties", chart:null };
const S2 = { view:"parties", ag:new Set(), hide:new Set(), chart:null };

// ══ Init ══════════════════════════════════════════════════
function init() {
  [...new Set(POLLS.map(p => p.agency))].forEach(a => S2.ag.add(a));
  buildChips2();
  showBanner();
  render1();
  render2();
}

// ══ Banner — 3 nejnovější průzkumy (bez podmínek) ═════════
function showBanner() {
  const latest = [...POLLS]
    .sort((a,b) => b.date_published.localeCompare(a.date_published))
    .slice(0, 5);
  if (!latest.length) return;
  document.getElementById("lboxItems").innerHTML = latest.map(p => {
    const url = AGENCY_URLS[p.agency] || "#";
    return `<div class="lbox-item">
      <a href="${url}" target="_blank">${p.agency}</a>
      <span class="dt">${fmt(p.date_published)}</span>
    </div>`;
  }).join("");
  document.getElementById("lbox").classList.add("on");
}

// ══ Nejnovější průzkum od každé agentury ══════════════════
function getLatestPerAgency() {
  const map = {};
  POLLS.forEach(p => {
    if (!map[p.agency] || p.date_fieldwork_to > map[p.agency].date_fieldwork_to)
      map[p.agency] = p;
  });
  return Object.values(map).sort((a,b) => a.agency.localeCompare(b.agency));
}

// ══ Seznam stran/koalic seřazených dle průměrné hodnoty ══
// Filtruje striktně dle COAL_IDS — ne dle pole "view" v záznamu
function getParties(polls, view) {
  const scores = {}, count = {};
  polls.forEach(p => {
    Object.entries(p.parties).forEach(([pid, val]) => {
      if (!PC[pid]) return;
      if (view === "parties"    &&  COAL_IDS.has(pid)) return;
      if (view === "coalitions" && !COAL_IDS.has(pid)) return;
      scores[pid] = (scores[pid] || 0) + val;
      count[pid]  = (count[pid]  || 0) + 1;
    });
  });
  return Object.keys(scores).sort((a,b) =>
    (scores[b]/count[b]) - (scores[a]/count[a])
  );
}

// ══ Plugin: čísla nad sloupci ═════════════════════════════
const barLabelsPlugin = {
  id: "barLabels",
  afterDatasetsDraw(chart) {
    const ctx = chart.ctx;
    chart.data.datasets.forEach((ds, i) => {
      const meta = chart.getDatasetMeta(i);
      if (meta.type !== "bar") return;
      meta.data.forEach((bar, j) => {
        const val = ds.data[j];
        // Zobraz pouze hodnoty >= 3 % aby se čísla nepřekrývala
        if (val == null || val < 3) return;
        ctx.save();
        ctx.fillStyle = "#4A5070";
        ctx.font = "500 8.5px 'Source Sans 3', sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "bottom";
        ctx.fillText(val.toFixed(1), bar.x, bar.y - 2);
        ctx.restore();
      });
    });
  }
};

// ══ Plugin: červená čára volebního cenzu (5 %) ════════════
const censusLinePlugin = {
  id: "censusLine",
  afterDraw(chart) {
    const { ctx, scales: { y } } = chart;
    if (!y) return;
    const yPos = y.getPixelForValue(5);
    const left  = chart.chartArea.left;
    const right = chart.chartArea.right;
    ctx.save();
    ctx.strokeStyle = "#C0272D";
    ctx.lineWidth = 1.5;
    ctx.setLineDash([5, 4]);
    ctx.beginPath();
    ctx.moveTo(left, yPos);
    ctx.lineTo(right, yPos);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = "#C0272D";
    ctx.font = "600 10px 'Source Sans 3', sans-serif";
    ctx.textAlign = "right";
    ctx.textBaseline = "bottom";
    ctx.fillText("5 % — volební cenzus", right - 4, yPos - 3);
    ctx.restore();
  }
};

// ══ GRAF 1 — grouped bar ══════════════════════════════════
function render1() {
  const latestPolls = getLatestPerAgency();
  const parties     = getParties(latestPolls, S1.view);

  if (!parties.length) {
    const ctx = document.getElementById("c1").getContext("2d");
    if (S1.chart) { S1.chart.destroy(); S1.chart = null; }
    ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
    ctx.save();
    ctx.fillStyle = "#8890B0";
    ctx.font = "14px 'Source Sans 3', sans-serif";
    ctx.textAlign = "center";
    ctx.fillText("Pro tento pohled nejsou v datech koaliční záznamy.", ctx.canvas.width/2, 160);
    ctx.restore();
    document.getElementById("avgRow").innerHTML = "";
    document.getElementById("leg1").innerHTML = "";
    document.getElementById("meta1").innerHTML = "";
    return;
  }

  const datasets = latestPolls.map(poll => {
    const col = AC[poll.agency] || "#888";
    return {
      label: poll.agency,
      data: parties.map(pid => poll.parties[pid] ?? null),
      backgroundColor: col + "CC",
      borderColor: col,
      borderWidth: 1.5,
    };
  });

  const ctx = document.getElementById("c1").getContext("2d");
  if (S1.chart) S1.chart.destroy();
  S1.chart = new Chart(ctx, {
    type: "bar",
    data: { labels: parties.map(pid => PC[pid]?.d || pid), datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode:"index", intersect:false },
      plugins: { legend:{display:false}, tooltip:tooltipOpts() },
      scales: {
        x: { grid:{display:false}, ticks:ticksOpts() },
        y: { min:0, max:45,
             grid:{ color:"#E8EAF0" },
             ticks:{ ...ticksOpts(),
               callback: v => v+" %",
               color: (c) => c.tick.value === 5 ? "#C0272D" : "#8890B0",
             } },
      },
    },
    plugins: [barLabelsPlugin, censusLinePlugin],
  });

  // Průměrový řádek
  let avgHtml = `<div class="avg-row-label">Aktuální průměr volebních preferencí ze všech agentur</div>`;
  parties.forEach(pid => {
    const vals = latestPolls.map(p => p.parties[pid]).filter(v => v != null);
    if (!vals.length) return;
    const avg = vals.reduce((s,v) => s+v, 0) / vals.length;
    const cfg = PC[pid];
    avgHtml += `<div class="avg-chip">
      <div class="dot" style="background:${cfg.c}"></div>
      <span>${cfg.d}</span>
      <strong>${avg.toFixed(1)} %</strong>
    </div>`;
  });
  document.getElementById("avgRow").innerHTML = avgHtml;

  // Legenda — agentury s datem
  document.getElementById("leg1").innerHTML = latestPolls.map(poll => {
    const isP = AGENCY_TYPE[poll.agency] === "preference";
    return `<div class="li nodim">
      <div class="ld" style="background:${AC[poll.agency]||'#888'}"></div>
      <span>${poll.agency}${isP ? ' <span class="pref-badge">pref</span>' : ''} — ${fmt(poll.date_fieldwork_to)}</span>
    </div>`;
  }).join("");

  // Meta s odkazovanými agenturami
  const agLinks = latestPolls.map(p =>
    `<a href="${AGENCY_URLS[p.agency]||'#'}" target="_blank">${p.agency}</a>`
  ).join(", ");
  document.getElementById("meta1").innerHTML = `
    <span>Agentury: <b>${agLinks}</b></span>
    <span>Zobrazeno: <b>${S1.view === "parties" ? "Strany" : "Koalice"}</b></span>`;
}

// ══ Pomocné: všechny měsíce od 2022-01 do dnes ═══════════
function getAllMonths() {
  const months = [];
  let d = new Date(2022, 0, 1);
  const now = new Date();
  while (d <= now) {
    months.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`);
    d.setMonth(d.getMonth() + 1);
  }
  return months;
}

function fmtMonth(ym) {
  const cs = ['led','úno','bře','dub','kvě','čvn','čvc','srp','zář','říj','lis','pro'];
  const [y, m] = ym.split('-');
  return `${cs[parseInt(m)-1]} ${y.slice(2)}`;
}

// ══ GRAF 2 — spojnicový, měsíční agregace ══════════════════
function render2() {
  const polls = POLLS
    .filter(p => S2.ag.has(p.agency))
    .sort((a,b) => a.date_fieldwork_to.localeCompare(b.date_fieldwork_to));

  if (!polls.length) return;

  const parties  = getParties(polls, S2.view).filter(p => !S2.hide.has(p));
  const agencies = [...new Set(polls.map(p => p.agency))].sort();

  // Agregace: pro každý měsíc a agenturu vezmi nejnovější průzkum
  const monthPollMap = {}; // { "YYYY-MM": { agency: latestPoll } }
  polls.forEach(p => {
    const mo = p.date_fieldwork_to.substring(0, 7);
    if (!monthPollMap[mo]) monthPollMap[mo] = {};
    const prev = monthPollMap[mo][p.agency];
    if (!prev || p.date_fieldwork_to > prev.date_fieldwork_to)
      monthPollMap[mo][p.agency] = p;
  });

  const allMonths   = getAllMonths();
  const monthLabels = allMonths.map(fmtMonth);

  const datasets = [];
  parties.forEach(pid => {
    const cfg = PC[pid] || { d:pid, c:"#888" };
    agencies.forEach(ag => {
      const hasAny = allMonths.some(m => monthPollMap[m]?.[ag]?.parties[pid] != null);
      if (!hasAny) return;
      const pubDates = allMonths.map(m => monthPollMap[m]?.[ag]?.date_published ?? null);
      datasets.push({
        label: `${cfg.d} · ${ag}`,
        pubDates,
        data: allMonths.map(m => {
          const p = monthPollMap[m]?.[ag];
          return (p && p.parties[pid] != null) ? p.parties[pid] : null;
        }),
        borderColor: cfg.c,
        backgroundColor: "transparent",
        borderWidth: 2,
        borderDash: AGENCY_DASH[ag] || [],
        pointRadius: 3, pointHoverRadius: 5,
        pointBackgroundColor: cfg.c,
        pointBorderColor: "#fff", pointBorderWidth: 1,
        tension: 0.3, spanGaps: false,
      });
    });
  });

  const ctx = document.getElementById("c2").getContext("2d");
  if (S2.chart) S2.chart.destroy();
  S2.chart = new Chart(ctx, {
    type: "line",
    data: { labels: monthLabels, datasets },
    options: {
      responsive:true, maintainAspectRatio:false,
      interaction:{ mode:"index", axis:"x", intersect:false },
      plugins:{ legend:{display:false}, tooltip:tooltipOpts() },
      scales: {
        x: { grid:{color:"#E8EAF0"},
             ticks:{ ...ticksOpts(), maxRotation:0, maxTicksLimit:18,
               font:{ family:"'Source Sans 3',sans-serif", size:10 } } },
        y: { min:0, max:45, grid:{color:"#E8EAF0"},
             ticks:{ ...ticksOpts(), callback:v => v+" %" } },
      },
    },
  });

  // Legenda část 1: strany (klikatelné — zapínání/vypínání)
  let legHtml = `<div style="display:flex;flex-wrap:wrap;gap:4px 12px;width:100%">`;
  parties.forEach(pid => {
    const cfg = PC[pid]; if (!cfg) return;
    legHtml += `<div class="li ${S2.hide.has(pid)?"off":""}" onclick="toggleParty2('${pid}')">
      <div class="ld" style="background:${cfg.c}"></div>
      <span>${cfg.d}</span>
    </div>`;
  });
  legHtml += `</div><div class="leg-div"></div>`;

  // Legenda část 2: agentury s čárovými vzory
  legHtml += `<div style="display:flex;flex-wrap:wrap;gap:4px 16px;width:100%">`;
  agencies.forEach(ag => {
    const dash = AGENCY_DASH[ag] || [];
    const isP  = AGENCY_TYPE[ag] === "preference";
    legHtml += `<div class="li nodim">
      <svg width="24" height="12" style="flex-shrink:0">
        <line x1="0" y1="6" x2="24" y2="6"
          stroke="${AC[ag]||'#888'}" stroke-width="2"
          stroke-dasharray="${dash.join(' ')}"/>
      </svg>
      <span>${ag}${isP ? ' <span class="pref-badge">pref</span>' : ''}</span>
    </div>`;
  });
  legHtml += `</div>`;
  document.getElementById("leg2").innerHTML = legHtml;

  const dates   = polls.map(p => p.date_fieldwork_to).sort();
  const agLinks = agencies.map(ag =>
    `<a href="${AGENCY_URLS[ag]||'#'}" target="_blank">${ag}</a>`
  ).join(", ");
  document.getElementById("meta2").innerHTML = `
    <span>Agentury: <b>${agLinks}</b></span>
    <span>Průzkumů: <b>${polls.length}</b></span>
    <span>Období: <b>${fmt(dates[0])} – ${fmt(dates[dates.length-1])}</b></span>`;
}

function toggleParty2(pid) {
  S2.hide.has(pid) ? S2.hide.delete(pid) : S2.hide.add(pid);
  render2();
}

// ══ Agency chips (graf 2) ══════════════════════════════════
function buildChips2() {
  const agencies = [...new Set(POLLS.map(p => p.agency))];
  document.getElementById("af2").innerHTML = agencies.map(a =>
    `<div class="ac on" id="af2-${a}" onclick="toggleAg2('${a}')">
       <span class="dot" style="background:${AC[a]||'#888'}"></span>${a}
     </div>`
  ).join("");
}

function toggleAg2(agency) {
  const chip = document.getElementById(`af2-${agency}`);
  if (S2.ag.has(agency)) {
    if (S2.ag.size <= 1) return;
    S2.ag.delete(agency);
    chip.classList.remove("on");
  } else {
    S2.ag.add(agency);
    chip.classList.add("on");
  }
  render2();
}

  document.getElementById("g1vC").classList.toggle("on", v === "coalitions");

  S2.view = v;

  document.getElementById("g2vC").classList.toggle("on", v === "coalitions");

}

// ══ Helpers ═══════════════════════════════════════════════
function fmt(iso) {
  if (!iso) return "";
  return new Date(iso+"T00:00:00").toLocaleDateString("cs-CZ",
    { day:"numeric", month:"short", year:"numeric" });
}
function ticksOpts() {
  return { font:{ family:"'Source Sans 3',sans-serif", size:11 }, color:"#8890B0" };
}
function tooltipOpts() {
  return {
    backgroundColor:"#2A2E4A",
    titleFont:{ family:"'Source Sans 3',sans-serif", size:11, weight:"600" },
    bodyFont:{ family:"'Source Sans 3',sans-serif", size:12 },
    padding:9,
    callbacks:{
      label: c => {
        const val = c.parsed.y;
        if (val == null) return null;
        // Zobraz datum vydání průzkumu pokud je uloženo v datasetu
        const pub = c.dataset.pubDates?.[c.dataIndex];
        const dateStr = pub ? `  (vydáno ${fmt(pub)})` : "";
        return ` ${c.dataset.label}: ${val} %${dateStr}`;
      }
    },
  };
}
